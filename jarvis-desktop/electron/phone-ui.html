<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#050507" />
<title>Jarvis</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100vh; height: 100dvh; background: #050507; color: white; font-family: 'Outfit', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.18) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(129,140,248,0.14) 0%, transparent 50%), #050507; }
  header { padding: env(safe-area-inset-top, 16px) 20px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
  header .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; }
  header .title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-family: 'JetBrains Mono', monospace; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .messages { flex: 1; overflow-y: auto; padding: 24px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 86%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; font-weight: 300; }
  .msg.user { align-self: flex-end; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.06); border-top-right-radius: 4px; }
  .msg.ai { align-self: flex-start; color: rgba(255,255,255,0.92); padding-left: 4px; padding-right: 4px; background: transparent; }
  .msg.ai .tool { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(251,191,36,0.85); margin-right: 6px; }
  .orb-wrap { display: flex; justify-content: center; align-items: center; height: 110px; position: relative; }
  .orb { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #ffffff 0%, #bae6fd 25%, #38bdf8 60%, #0c4a6e 100%); box-shadow: 0 0 50px rgba(56,189,248,0.5), inset 0 0 30px rgba(255,255,255,0.3); animation: breathe 4s ease-in-out infinite; }
  .orb.thinking { animation: think 1.5s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes think { 0%,100% { transform: scale(1); box-shadow: 0 0 50px rgba(129,140,248,0.7), inset 0 0 30px rgba(255,255,255,0.3); } 50% { transform: scale(1.08); box-shadow: 0 0 70px rgba(129,140,248,0.9), inset 0 0 30px rgba(255,255,255,0.5); } }
  form { padding: 12px 14px calc(env(safe-area-inset-bottom, 12px) + 12px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 8px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); }
  input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 22px; padding: 12px 16px; color: white; font-size: 16px; font-family: inherit; font-weight: 300; outline: none; }
  input:focus { border-color: rgba(56,189,248,0.5); }
  button { width: 44px; height: 44px; border-radius: 50%; background: white; color: black; border: none; font-size: 18px; font-weight: 600; cursor: pointer; }
  button:active { transform: scale(0.94); }
  button:disabled { opacity: 0.3; }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="dot"></div>
    <div class="title">JARVIS · MOBILE</div>
  </header>
  <div class="messages" id="messages">
    <div class="orb-wrap"><div class="orb" id="orb"></div></div>
  </div>
  <form id="form">
    <input id="input" placeholder="Tell Jarvis to do something…" autocomplete="off" />
    <button id="send" type="submit">→</button>
  </form>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const orb = document.getElementById('orb');
  const form = document.getElementById('form');
  const sessionId = localStorage.getItem('jarvis_phone_sid') || (crypto.randomUUID());
  localStorage.setItem('jarvis_phone_sid', sessionId);
  const token = new URLSearchParams(location.search).get('k');

  function addMsg(role, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }
  function setBusy(b) { orb.classList.toggle('thinking', b); sendBtn.disabled = b; }

  async function send(text) {
    addMsg('user', text);
    const aiEl = addMsg('ai', '');
    setBusy(true);
    try {
      const res = await fetch('/chat?k=' + encodeURIComponent(token), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n\n');
        buf = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          try {
            const ev = JSON.parse(line.slice(5).trim());
            if (ev.type === 'delta') aiEl.textContent += ev.content;
            else if (ev.type === 'tool_call') {
              const tag = document.createElement('span');
              tag.className = 'tool';
              tag.textContent = '⚙ ' + ev.name;
              aiEl.appendChild(tag);
            }
            else if (ev.type === 'error') aiEl.textContent += '\n⚠ ' + ev.message;
          } catch {}
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    } catch (e) {
      aiEl.textContent = '⚠ ' + e.message;
    }
    setBusy(false);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    send(text);
  });
</script>
</body>
</html>
